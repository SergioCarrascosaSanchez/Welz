<div
  *ngIf="type === 'regular'"
  style="display: grid; place-content: space-between"
  (mouseover)="onHover()"
  (mouseleave)="onLeave()"
>
  <div style="display: grid">
    <app-badge
      [text]="transaction.budgetCategory.name"
      [color]="transaction.budgetCategory.color"
    ></app-badge>
    <span class="date">{{ transaction.date | date : "dd/MM/yyyy" }} </span>
    <div class="description">
      {{ transaction.description }}
    </div>
  </div>

  <div style="grid-column: 2; display: grid; place-content: center">
    <div
      (click)="onDelete()"
      *ngIf="displayMenu"
      style="
        cursor: pointer;
        grid-column: 1;
        margin-right: 5px;
        display: grid;
        place-content: center;
      "
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M17 5V4C17 2.89543 16.1046 2 15 2H9C7.89543 2 7 2.89543 7 4V5H4C3.44772 5 3 5.44772 3 6C3 6.55228 3.44772 7 4 7H5V18C5 19.6569 6.34315 21 8 21H16C17.6569 21 19 19.6569 19 18V7H20C20.5523 7 21 6.55228 21 6C21 5.44772 20.5523 5 20 5H17ZM15 4H9V5H15V4ZM17 7H7V18C7 18.5523 7.44772 19 8 19H16C16.5523 19 17 18.5523 17 18V7Z"
          fill="rgb(231, 76, 60)"
        />
        <path d="M9 9H11V17H9V9Z" fill="rgb(231, 76, 60)" />
        <path d="M13 9H15V17H13V9Z" fill="rgb(231, 76, 60)" />
      </svg>
    </div>
    <span
      style="
        text-align: right;
        grid-column: 2;
        display: grid;
        place-content: center;
      "
    >
      {{ transaction.value | moneyFormat }}
    </span>
  </div>
</div>

<div
  *ngIf="type === 'budget'"
  style="
    display: grid;
    place-content: space-between;
    margin-top: 1.2vh;
    margin-bottom: 1.2vh;
  "
  (mouseover)="onHover()"
  (mouseleave)="onLeave()"
>
  <div class="description-date-container">
    {{ transaction.description }}
    <span style="color: rgba(150, 150, 150, 1); margin-left: 0.5vw"
      >{{ transaction.date | date : "dd/MM/yyyy" }}
    </span>
  </div>

  <div style="grid-column: 2; display: grid; place-content: center">
    <div
      (click)="onDelete()"
      *ngIf="displayMenu"
      style="
        cursor: pointer;
        grid-column: 1;
        margin-right: 5px;
        display: grid;
        place-content: center;
      "
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M17 5V4C17 2.89543 16.1046 2 15 2H9C7.89543 2 7 2.89543 7 4V5H4C3.44772 5 3 5.44772 3 6C3 6.55228 3.44772 7 4 7H5V18C5 19.6569 6.34315 21 8 21H16C17.6569 21 19 19.6569 19 18V7H20C20.5523 7 21 6.55228 21 6C21 5.44772 20.5523 5 20 5H17ZM15 4H9V5H15V4ZM17 7H7V18C7 18.5523 7.44772 19 8 19H16C16.5523 19 17 18.5523 17 18V7Z"
          fill="rgb(231, 76, 60)"
        />
        <path d="M9 9H11V17H9V9Z" fill="rgb(231, 76, 60)" />
        <path d="M13 9H15V17H13V9Z" fill="rgb(231, 76, 60)" />
      </svg>
    </div>
    <span
      style="
        text-align: right;
        grid-column: 2;
        display: grid;
        place-content: center;
      "
    >
      {{ transaction.value | moneyFormat }}
    </span>
  </div>
</div>
