<app-card type="subcard">
  <div style="display: grid; place-content: space-between">
    <div style="display: grid">
      <app-badge
        [text]="transaction.budgetCategory.name"
        [color]="transaction.budgetCategory.color"
      ></app-badge>
      <span class="date">{{ transaction.date | date : "dd/MM/yyyy" }} </span>
      <div class="description">
        {{ transaction.description }}
      </div>
    </div>

    <span
      style="
        text-align: right;
        grid-column: 2;
        display: grid;
        place-content: center;
      "
      >{{ transaction.value | moneyFormat }}
    </span>
  </div>
</app-card>
