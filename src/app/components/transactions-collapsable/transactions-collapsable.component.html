<div (click)="onClick()">
  <app-card type="subcard">
    <div
      *ngIf="isAccount(data)"
      style="
        display: grid;
        place-content: space-between;
        padding-top: 3px;
        padding-bottom: 3px;
      "
    >
      <div style="display: grid; place-content: center">{{ data.name }}</div>

      <div
        style="
          text-align: right;
          grid-column: 2;
          display: grid;
          place-content: center;
        "
      >
        <span style="display: grid; place-content: center; grid-column: 1"
          >{{ data.balance | moneyFormat }}
        </span>
        <button class="icon" (click)="onClick()" style="grid-column: 2">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            (click)="onClick()"
          >
            <path
              *ngIf="!open"
              id="chevron-down"
              d="M6.34317 7.75732L4.92896 9.17154L12 16.2426L19.0711 9.17157L17.6569 7.75735L12 13.4142L6.34317 7.75732Z"
              fill="currentColor"
            />
            <path
              *ngIf="open"
              id="chevron-up"
              d="M17.6569 16.2427L19.0711 14.8285L12.0001 7.75739L4.92896 14.8285L6.34317 16.2427L12.0001 10.5858L17.6569 16.2427Z"
              fill="currentColor"
            />
          </svg>
        </button>
      </div>
    </div>
    <div
      *ngIf="isBudgetCategory(data)"
      style="
        display: grid;
        place-content: space-between;
        padding-top: 3px;
        padding-bottom: 3px;
      "
    >
      <app-badge [text]="data.name" [color]="data.color"></app-badge>

      <div
        style="
          margin-top: 5px;
          text-align: right;
          grid-column: 2;
          display: grid;
          place-content: center;
        "
      >
        <div style="grid-column: 1">
          <span>
            {{ transactionQuantityTotal | moneyFormat }}
          </span>

          <span style="color: #979797"> / {{ data.max | moneyFormat }} </span>
        </div>
        <div style="grid-column: 2">
          <button class="add-icon" (click)="onClick()">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              (click)="onClick()"
            >
              <path
                *ngIf="!open"
                d="M6.34317 7.75732L4.92896 9.17154L12 16.2426L19.0711 9.17157L17.6569 7.75735L12 13.4142L6.34317 7.75732Z"
                fill="currentColor"
              />
              <path
                *ngIf="open"
                d="M17.6569 16.2427L19.0711 14.8285L12.0001 7.75739L4.92896 14.8285L6.34317 16.2427L12.0001 10.5858L17.6569 16.2427Z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div
      *ngIf="open && listOfTransactions.length >= 1"
      style="border-top: solid 2px rgb(218, 218, 218); margin-top: 1.2vh"
    >
      <div
        style="margin-top: 14px"
        *ngFor="let transaction of listOfTransactions"
      >
        <app-transaction
          [transaction]="transaction"
          [type]="getTrasanctionType()"
        >
        </app-transaction>
      </div>
    </div>
    <div
      *ngIf="open && listOfTransactions.length <= 0"
      style="color: rgba(150, 150, 150, 1); margin-top: 2.5%"
    >
      {{ emptyTransactionsMessage }}
    </div>
  </app-card>
</div>
