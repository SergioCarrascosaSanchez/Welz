<nav
  style="
    display: inline-flex;
    gap: 1vw;
    align-items: flex-end;
    list-style-type: none;
    padding-left: 0;
    padding-right: 0;
    border-bottom: solid 2px #d1d1d1;
    margin-block-start: 0;
    margin-block-end: 0;
  "
>
  <li *ngFor="let navbarItem of navbarItems">
    <a
      [routerLink]="navbarItem.route"
      routerLinkActive
      [routerLinkActiveOptions]="{ exact: true }"
      #rla="routerLinkActive"
      [ngClass]="rla.isActive ? 'activated-route' : 'not-activated-route'"
      >{{ navbarItem.text }}</a
    >
  </li>
</nav>
