<div style="position: static">
  <app-icon-button type="three-dots" (click)="onToggleMenu()"></app-icon-button>

  <div
    *ngIf="displayMenu"
    style="
      background-color: #f1f2f5;
      z-index: 2;
      position: absolute;
      width: 100px;
      padding: 2px;
      border-radius: 5px;
      border: solid 1px #e9e9e9;
      margin-left: -100px;
      margin-top: -26px;
      cursor: pointer;
    "
  >
    <div style="padding: 3px" (click)="onEdit()">Editar</div>
    <div style="padding: 3px" (click)="onDelete()">Eliminar</div>
  </div>
</div>
