<div class="container">
  <app-icon-button type="three-dots" (click)="onToggleMenu()"></app-icon-button>

  <div
    *ngIf="displayMenu"
    style="
      background-color: #f1f2f5;
      z-index: 2;
      position: absolute;
      width: 100px;
      padding: 2px;
      border-radius: 5px;
      border: solid 1px #e9e9e9;
      margin-left: -110px;
      margin-top: -26px;
      cursor: pointer;
      text-align: left;
    "
  >
    <div style="padding: 3px" (click)="onEdit()">{{ editText }}</div>
    <div style="padding: 3px" (click)="onDelete()">{{ deleteText }}</div>
  </div>
</div>
