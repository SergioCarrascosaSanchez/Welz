<div *ngIf="dataLoaded">
  <div class="app-container">
    <div>
      <h1 style="margin-block-start: 0.67em; margin-block-end: 0px">
        Hola, {{ username }}
      </h1>
      <div style="display: flex; justify-content: space-between">
        <div style="display: grid; place-content: end">
          <app-navbar></app-navbar>
        </div>
        <app-icon-button (click)="onAdd()" type="add-primary"></app-icon-button>
      </div>

      <app-modal [open]="addModalOpen" (closeEmmitter)="onClose()">
        <app-transaction-form (closeEmitter)="onClose()"></app-transaction-form>
      </app-modal>

      <div *ngIf="dataLoaded">
        <router-outlet></router-outlet>
        <div style="height: 30px"></div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="!dataLoaded">
  <app-loading-spinner></app-loading-spinner>
</div>
